<!DOCTYPE html>
<html>
<head>
<style>
    #viewport {
        cursor: grab;
        display: flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        margin: 0;
        padding: 0;
        border: 0;
    }

    #image-container img {
        width: auto;
        height: auto;
        vertical-align: top;
        margin: 0;
        padding: 0;
        border: 0;
    }

    #image-container div {
        position:absolute;
        font-size: 80px;
        margin: 0;
        padding: 0;
        border: 0;
    }

    button {
        width: 140px;
    }
</style>
</head>
<body>
    <div style="display:none;">
    <div>
        <button data-zoom-down>Zoom Down</button>
        <input data-zoom-range type="range"/>
        <button data-zoom-up>Zoom Up</button>
    </div>
    </div>
    <div class="container">
        <div id="viewport" style="height:100vh">
            <div id="image-container">
                {% for image in images %}
                <img src = {{image}} />
                {% endfor %}
            </div>
        </div>
    </div>
<script src={{url_for("static", filename="wheel-zoom.js")}} type="text/javascript"></script>

<script type="text/javascript">
document.addEventListener('DOMContentLoaded', function () {
    var imageElement = document.getElementById('image-container').querySelector('img');

    if (imageElement.complete) {
        init();
    } else {
        imageElement.onload = init;
    }

    function init() {
        var rangeElement = document.querySelector('[data-zoom-range]');

        var wzoom = WZoom.create('#image-container', {
            type: 'html',
            alignContent: 'center',
            width: imageElement.naturalWidth,
            height: {{img_height}},
            onGrab: function () {
                document.getElementById('viewport').style.cursor = 'grabbing';
            },
            onDrop: function () {
                document.getElementById('viewport').style.cursor = 'grab';
            },
            prepare: function (instance) {
                rangeElement.defaultValue = 0;
                rangeElement.max = Math.round(Math.log(instance.content.maxScale / instance.content.minScale) / Math.log(instance.options.speed));
            },
            rescale: function (instance) {
                rangeElement.value = Math.round(Math.log(instance.content.currentScale / instance.content.minScale) / Math.log(instance.options.speed));
            },
            smoothTime: 0,
            zoomOnClick: false,
            zoomOnDblClick: true,
            maxScale: 2
        });
        window.addEventListener('resize', function () {
            wzoom.prepare();
        });

        rangeElement.addEventListener('input', function () {
            var newZoom = Number(rangeElement.value);

            if (newZoom === 0) {
                wzoom.maxZoomDown();
            } else if (newZoom === rangeElement.max) {
                wzoom.maxZoomUp();
            } else {
                var oldZoom = Math.round(Math.log(wzoom.content.currentScale / wzoom.content.minScale) / Math.log(wzoom.options.speed));

                if (newZoom > oldZoom) {
                    wzoom.zoomUp();
                } else {
                    wzoom.zoomDown();
                }
            }
        });
    }
});
</script>

</html>
