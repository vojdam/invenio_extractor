[project]
name = "InveNIO Extractor"
version = "1.1.2"
authors = [
  { name="Vojtech Damian", email="vojdam@email.cz" },
]
dependencies = [
    "flask",
    "pydicom",
    "Pillow",
    "natsort",
    "numpy",
]
description = "Flask app for extracting and viewing data and images generated by InveNIO"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/vojdam/invenio_extractor"

[build-system]
requires = ["flit_core<4"]
build-backend = "flit_core.buildapi"